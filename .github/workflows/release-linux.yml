name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Artifact version label; defaults to YYYYMMDD-shortsha when empty'
        required: false
        type: string

permissions:
  contents: read

env:
  ZIG_TARBALL_URL: https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
  ZIG_TARBALL_SHA256: 02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Zig
        run: |
          mkdir -p .local/zig
          curl -fsSL "${ZIG_TARBALL_URL}" -o .local/zig.tar.xz
          printf '%s  %s\n' "${ZIG_TARBALL_SHA256}" .local/zig.tar.xz | sha256sum -c -
          tar -xf .local/zig.tar.xz -C .local/zig --strip-components=1
          echo "${PWD}/.local/zig" >> "${GITHUB_PATH}"

      - name: Run tests
        run: zig build test

  build:
    name: Build ${{ matrix.arch_label }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            arch_label: linux-x64
            ort_dir: onnxruntime-linux-x64-1.24.4
          - target: aarch64-linux-gnu
            arch_label: linux-aarch64
            ort_dir: onnxruntime-linux-aarch64-1.24.4
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Fetch model artifacts
        run: git lfs pull --include="models/autoshot.onnx"

      - name: Install Zig
        run: |
          mkdir -p .local/zig
          curl -fsSL "${ZIG_TARBALL_URL}" -o .local/zig.tar.xz
          printf '%s  %s\n' "${ZIG_TARBALL_SHA256}" .local/zig.tar.xz | sha256sum -c -
          tar -xf .local/zig.tar.xz -C .local/zig --strip-components=1
          echo "${PWD}/.local/zig" >> "${GITHUB_PATH}"

      - name: Compute version
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          ARCH_LABEL: ${{ matrix.arch_label }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION#v}"
          else
            version="$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          fi

          version="$(printf '%s' "${version}" | tr -cs 'A-Za-z0-9._+-' '-')"
          package_name="shot-boundary-${version}-${ARCH_LABEL}"

          {
            echo "version=${version}"
            echo "package_name=${package_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build binary
        run: |
          zig build \
            -Dtarget=${{ matrix.target }} \
            -Doptimize=ReleaseFast \
            --prefix zig-out/${{ matrix.arch_label }}

      - name: Check release rpath
        run: |
          readelf -d zig-out/${{ matrix.arch_label }}/bin/shot-boundary | grep -F '$ORIGIN/../lib'

      - name: Package CLI
        env:
          PACKAGE_NAME: ${{ steps.meta.outputs.package_name }}
          VERSION: ${{ steps.meta.outputs.version }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          ORT_DIR: ${{ matrix.ort_dir }}
        run: |
          package_dir="dist/${PACKAGE_NAME}"
          mkdir -p "${package_dir}/bin" "${package_dir}/lib" "${package_dir}/models" "${package_dir}/third_party/onnxruntime"

          cp "zig-out/${ARCH_LABEL}/bin/shot-boundary" "${package_dir}/bin/"
          cp models/autoshot.onnx "${package_dir}/models/"
          cp -P externals/onnxruntime/"${ORT_DIR}"/lib/libonnxruntime.so* "${package_dir}/lib/"
          cp -P externals/onnxruntime/"${ORT_DIR}"/lib/libonnxruntime_providers_shared.so "${package_dir}/lib/"
          cp externals/onnxruntime/"${ORT_DIR}"/LICENSE \
            externals/onnxruntime/"${ORT_DIR}"/ThirdPartyNotices.txt \
            externals/onnxruntime/"${ORT_DIR}"/Privacy.md \
            externals/onnxruntime/"${ORT_DIR}"/README.md \
            externals/onnxruntime/"${ORT_DIR}"/VERSION_NUMBER \
            externals/onnxruntime/"${ORT_DIR}"/GIT_COMMIT_ID \
            "${package_dir}/third_party/onnxruntime/"

          cat > "${package_dir}/README.release.md" <<EOF
          # shot-boundary ${VERSION} ${ARCH_LABEL}

          This archive contains the Linux CLI build and the ONNX Runtime shared libraries needed by the executable.

          Run:

              ./bin/shot-boundary --help

          Linux uses the ONNX Runtime CPU execution provider by default.
          EOF

          tar -C dist -czf "dist/${PACKAGE_NAME}.tar.gz" "${PACKAGE_NAME}"
          sha256sum "dist/${PACKAGE_NAME}.tar.gz" > "dist/${PACKAGE_NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.meta.outputs.package_name }}
          path: |
            dist/${{ steps.meta.outputs.package_name }}.tar.gz
            dist/${{ steps.meta.outputs.package_name }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: shot-boundary-*
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
